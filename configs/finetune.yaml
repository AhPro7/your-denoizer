# ============================================================
# Your Denoizer — Training Configuration
# ============================================================
# Fine-tune Conv-TasNet-Tiny for Target Speaker Extraction
# Multilingual: Arabic-focused + English + more
# ============================================================

experiment_name: "tse_multilingual_arabic"

# ============================================================
# Model Configuration
# ============================================================
model:
  size: "tiny"              # nano / tiny / small / standard
  speaker_dim: 192          # ECAPA-TDNN embedding dimension

# ============================================================
# Data Configuration
# ============================================================
data:
  sample_rate: 16000
  segment_length: 64000     # 4 seconds at 16kHz
  batch_size: 16            # Adjust based on GPU VRAM (T4: 16, A100: 32)
  num_workers: 4
  samples_per_epoch: 20000  # Virtual epoch size
  val_samples: 2000         # Validation samples per epoch
  
  # ---- Mixing parameters ----
  num_interferers: 2        # Max number of interfering speakers
  sir_range: [-5, 5]        # Signal-to-Interference Ratio (dB) — interferer can be LOUDER
  snr_range: [5, 20]        # Signal-to-Noise Ratio (dB)
  noise_prob: 0.7           # Probability of adding environmental noise
  rir_prob: 0.3             # Probability of adding reverb
  speed_perturb_prob: 0.3   # Probability of speed perturbation
  
  # ---- HuggingFace Speech Datasets ----
  # Add as many as you want! The loader handles any audio column name.
  # Set streaming: true for large datasets you don't want to download fully.
  hf_speech:
    # === Arabic (Primary Focus) ===
    - name: "mozilla-foundation/common_voice_17_0"
      subset: "ar"
      audio_column: "audio"
      speaker_column: "client_id"
      streaming: true
    
    # === English (Foundation) ===
    - name: "openslr/librispeech_asr"
      subset: "train.clean.100"
      split: "train.clean.100"
      audio_column: "audio"
      speaker_column: "speaker_id"
      streaming: false
      max_samples: 30000

    # === More Arabic ===
    # Uncomment these as needed:
    # - name: "google/fleurs"
    #   subset: "ar_eg"                 # Egyptian Arabic
    #   audio_column: "audio"
    #   speaker_column: "id"            # FLEURS has numeric IDs
    #   streaming: true
    
    # - name: "google/fleurs"
    #   subset: "ar_sa"                 # Saudi Arabic
    #   audio_column: "audio"
    #   speaker_column: "id"
    #   streaming: true
    
    # === Multilingual Expansion ===
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "fr"                    # French
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true
    
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "de"                    # German
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true
    
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "zh-CN"                 # Chinese
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true

    # === VoxCeleb (Speaker Diversity) ===
    # - name: "ProgramComputer/voxceleb"
    #   subset: "vox1"
    #   audio_column: "audio"
    #   speaker_column: "speaker_id"
    #   streaming: true

  # ---- HuggingFace Noise Datasets ----
  hf_noise:
    # MUSAN noise subset (background noise, babble, music)
    # - name: "flozi00/MUSAN-Noise"
    #   audio_column: "audio"
    #   category: "noise"
    #   streaming: true
    
    # Environmental Sound Classification (cars, sirens, street, etc.)
    # - name: "danavery/urbansound8K"
    #   audio_column: "audio"
    #   label_column: "class"
    #   category: "urban"
    #   streaming: false
    
    # FSD50K (Freesound — huge variety of real-world sounds)
    # - name: "google/fsd50k"
    #   audio_column: "audio"
    #   category: "environment"
    #   streaming: true

  # ---- Local Speech Directories ----
  # Point these to downloaded datasets on your machine
  local_speech:
    # librispeech: "/path/to/LibriSpeech/train-clean-100"
    # voxceleb: "/path/to/VoxCeleb1/wav"
    # arabic_custom: "/path/to/my_arabic_speech_data"

  # ---- Local Noise Directories ----
  local_noise:
    # musan: "/path/to/musan"
    # demand: "/path/to/DEMAND"
    # rir: "/path/to/RIRS_NOISES/simulated_rirs"

# ============================================================
# Training Configuration
# ============================================================
training:
  epochs: 50
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_epochs: 3
  patience: 10              # Early stopping patience
  
  loss: "si_snr"            # "si_snr" or "combined"
  si_snr_weight: 1.0        # Weight for SI-SNR loss (if combined)
  stft_weight: 0.1          # Weight for STFT loss (if combined)
  
  mixed_precision: true     # FP16 training (CUDA only, ~2x speedup)
  
  output_dir: "checkpoints"
  save_every: 10            # Save checkpoint every N epochs

# ============================================================
# Inference Configuration
# ============================================================
inference:
  device: "cpu"             # Always CPU for M4 Mac inference
  format: "onnx"            # "pytorch", "onnx", or "coreml"
  chunk_size: 64000         # 4 seconds per chunk
  overlap: 0.5              # 50% overlap for overlap-add
