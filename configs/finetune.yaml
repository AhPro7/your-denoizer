# ============================================================
# 🎤 Your Denoizer — Training Configuration
# ============================================================
# Phase 1: Speech Enhancement (Denoising)
# Conv-TasNet-Tiny (Enhancement Mode)
# Noise: MUSAN + UrbanSound + Car/Street + Reverb
# ============================================================

experiment_name: "tse_multilingual_arabic"

# ============================================================
# Model
# ============================================================
model:
  size: "tiny"              # nano(0.5M) / tiny(1.3M) / small(2.5M) / standard(5.1M)
  speaker_dim: 0            # 0 = Enhancement mode (no speaker conditioning)

# ============================================================
# Data
# ============================================================
data:
  sample_rate: 16000
  segment_length: 64000     # 4 seconds at 16kHz
  batch_size: 16            # T4: 16, A100: 32, CPU: 4
  num_workers: 4            # Colab: 2, local GPU: 4-8
  samples_per_epoch: 20000  # Virtual epoch size
  val_samples: 2000         # Validation samples per epoch
  
  # ---- Mixing Parameters ----
  snr_range: [3, 20]        # Noise is ALWAYS quieter than speech (positive SNR)
  noise_prob: 0.8           # 80% of samples get environmental noise
  rir_prob: 0.5             # 30% of samples get room reverb
  speed_perturb_prob: 0.5   # 30% of samples get speed/pitch change

  # ===========================================================
  # HuggingFace Speech Datasets
  # ===========================================================
  # ===========================================================
  # Each entry needs: name, audio_column
  # Set streaming: true for large datasets (saves disk space)
  # Add/remove freely — the loader handles everything!
  
  hf_speech:
    # ═══ Arabic (Primary Focus) ═══
    - name: "mozilla-foundation/common_voice_17_0"
      subset: "ar"
      audio_column: "audio"
      streaming: true

    # ═══ English (Foundation) ═══
    - name: "openslr/librispeech_asr"
      subset: "train.clean.100"
      split: "train.clean.100"
      audio_column: "audio"
      streaming: false
      max_samples: 30000

    # ═══ More Arabic Dialects ═══
    # Uncomment to add:
    # - name: "google/fleurs"
    #   subset: "ar_eg"                 # Egyptian Arabic
    #   audio_column: "audio"
    #   streaming: true
    
    # - name: "google/fleurs"
    #   subset: "ar_sa"                 # Saudi Arabic
    #   audio_column: "audio"
    #   streaming: true

    # ═══ Multilingual Expansion ═══
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "fr"
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true
    
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "de"
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true
    
    # - name: "mozilla-foundation/common_voice_17_0"
    #   subset: "zh-CN"
    #   audio_column: "audio"
    #   speaker_column: "client_id"
    #   streaming: true

    # ═══ Speaker Diversity ═══
    # - name: "ProgramComputer/voxceleb"
    #   subset: "vox1"
    #   audio_column: "audio"
    #   speaker_column: "speaker_id"
    #   streaming: true
    
    # - name: "edinburghcstr/vctk"
    #   audio_column: "audio"
    #   speaker_column: "speaker_id"
    #   streaming: false

  # ===========================================================
  # HuggingFace Noise Datasets
  # ===========================================================
  # These are ACTIVE (not commented) — noise makes the model robust!
  
  hf_noise:
    # MUSAN: background noise, babble, music, machinery
    - name: "flozi00/MUSAN-Noise"
      audio_column: "audio"
      category: "noise"
      streaming: true

    # UrbanSound8K: car horns, sirens, engines, street music, jackhammers
    # - name: "danavery/urbansound8K"
    #   audio_column: "audio"
    #   label_column: "class"
    #   category: "urban"
    #   streaming: false
    
    # FSD50K: 50K Freesound clips — huge variety
    # - name: "google/fsd50k"
    #   audio_column: "audio"
    #   category: "environment"
    #   streaming: true

  # ===========================================================
  # Local Speech & Noise (if downloaded to disk)
  # ===========================================================
  local_speech: {}
    # librispeech: "/data/LibriSpeech/train-clean-100"
    # voxceleb: "/data/VoxCeleb1/wav"

  local_noise: {}
    # musan: "/data/musan"
    # demand: "/data/DEMAND"           # car, street, cafe, metro noise
    # rir: "/data/RIRS_NOISES/simulated_rirs"

# ============================================================
# Training
# ============================================================
training:
  epochs: 50
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_epochs: 3
  patience: 10              # Early stopping patience
  
  loss: "combined"          # "si_snr" or "combined" (SI-SNR + STFT)
  si_snr_weight: 1.0
  stft_weight: 0.1
  
  mixed_precision: true     # FP16 (CUDA only, ~2x speedup)
  
  # ---- Checkpointing ----
  output_dir: "experiments" # Root output directory
  save_every: 5             # Save periodic checkpoint every N epochs
  
  # ---- TensorBoard Audio Logging ----
  audio_log_every: 5        # Log audio samples every N epochs
  num_audio_samples: 4      # Number of mixture/target/estimated triplets to log
  log_interval: 50          # Log training metrics every N steps

# ============================================================
# Inference
# ============================================================
inference:
  device: "cpu"             # Always CPU for M4 Mac
  format: "onnx"            # "pytorch", "onnx", or "coreml"
  chunk_size: 64000         # 4 seconds per chunk
  overlap: 0.5              # 50% overlap for overlap-add
